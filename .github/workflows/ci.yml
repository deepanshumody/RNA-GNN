name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: pip install ruff pytest numpy

      - name: Lint (critical errors only)
        run: ruff check .

      - name: Byte-compile all sources
        run: python -m compileall -q .

      - name: Run tests
        run: pytest -q
